---
layout: single
title: Welcome to BOCC
permalink: /checkin/bocc
---


<h2 id="checkinHeader">Please check in</h2>
<form id="checkinForm">
    <input type="hidden" id="eventId" value="bocc">

    <div class="form-group">
        <label for="name">Name (required):</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
        <label for="email">Email (required):</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
        <label for="phone">Phone (optional):</label>
        <input type="tel" id="phone" name="phone">
    </div>

    <div class="form-group">
        <label for="businessName">Business Name (optional):</label>
        <input type="text" id="businessName" name="businessName">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="okToEmail" name="okToEmail">
        <label for="okToEmail">Send me updates about future BOCC events</label>
    </div>

    <div class="honeypot-field" aria-hidden="true">
        <input type="text" name="website" tabindex="-1" autocomplete="off">
    </div>
    <hr>
    <button type="button" id="checkinButton">Check In</button>
</form>

<div id="greeting" style="display:none;">
</div>

<script src="/js/checkin.js"></script>
